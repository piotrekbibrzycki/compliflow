server:
  port: 8082

spring:
  application:
    name: transfer-service

  datasource:
    url: jdbc:postgresql://transfer-db:5432/transfers
    username: user
    password: passwd

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

account-service:
  url: http://account-service:8081
