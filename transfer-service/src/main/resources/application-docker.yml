server:
  port: 8082

spring:
  application:
    name: transfer-service

  datasource:
    url: jdbc:postgresql://transfer-db:5432/transfers
    username: user
    password: passwd

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

account-service:
  url: http://account-service:8081


blockchain:
  enabled: ${BLOCKCHAIN_ENABLED:false}
  rpc-url: ${BLOCKCHAIN_RPC_URL:http://localhost:8545}
  private-key: ${BLOCKCHAIN_PRIVATE_KEY:}
  contract-address: ${BLOCKCHAIN_CONTRACT_ADDRESS:}
  network: ${BLOCKCHAIN_NETWORK:sepolia}
  chain-id: ${BLOCKCHAIN_CHAIN_ID:11155111}
  gas-price-wei: ${BLOCKCHAIN_GAS_PRICE_WEI:20000000000}
  gas-limit: ${BLOCKCHAIN_GAS_LIMIT:300000}
