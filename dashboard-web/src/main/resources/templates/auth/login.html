<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CompliFlow Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body class="auth-body">
<div class="auth-shell">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="brand-mark">CF</div>
            <div>
                <div class="brand-title">CompliFlow</div>
                <div class="brand-subtitle">Compliance-first payment orchestration</div>
            </div>
        </div>

        <div class="auth-copy">
            <h1>Sign in to the operations console</h1>
            <p>Use your CompliFlow administrator account to access transfers, review workflows, audit trails and blockchain proof verification.</p>
        </div>

        <div th:if="${loginError}" class="alert alert-danger" th:text="${loginError}"></div>

        <form th:action="@{/login}" th:object="${loginForm}" method="post" class="auth-form">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" th:field="*{email}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
            </div>

            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" th:field="*{password}">
                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
            </div>

            <button type="submit" class="btn btn-dark w-100">Sign in</button>
        </form>
    </div>
</div>
</body>
</html>
