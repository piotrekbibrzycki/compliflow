<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 480" width="100%" height="100%">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 1 L 8 5 L 0 9 z" fill="#888"/>
        </marker>
    </defs>
    <style>
        text {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 13px;
            fill: #333333;
        }
        .subtext {
            font-size: 12px;
            fill: #888888;
        }
        .title {
            font-size: 11px;
            fill: #999999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .box {
            fill: #ffffff;
            stroke: #666666;
            stroke-width: 1.2;
            rx: 4;
        }
        .line {
            stroke: #888888;
            stroke-width: 1.2;
            fill: none;
        }
        .divider {
            stroke: #cccccc;
            stroke-width: 1.5;
            stroke-dasharray: 3, 5;
        }
        .inner-line {
            stroke: #e0e0e0;
            stroke-width: 1.2;
        }
    </style>

    <text x="50" y="40" class="title">audit proof · v1</text>
    <text x="780" y="40" class="title" text-anchor="end">keccak256 · web3j · solidity</text>

    <text x="50" y="90" class="title">canonical</text>
    <text x="250" y="90" class="title">hash</text>
    <text x="430" y="90" class="title">anchor</text>
    <text x="650" y="90" class="title">store</text>

    <rect x="50" y="100" width="160" height="130" class="box"/>
    <text x="130" y="125" text-anchor="middle" font-weight="500">transfer</text>
    <line x1="65" y1="135" x2="195" y2="135" class="inner-line"/>
    <text x="65" y="160" class="subtext">+ audit events</text>
    <text x="65" y="180" class="subtext">+ decision</text>
    <text x="65" y="200" class="subtext">→ sorted json</text>

    <path d="M 210 165 L 242 165" class="line" marker-end="url(#arrow)"/>

    <rect x="250" y="100" width="140" height="130" class="box"/>
    <text x="320" y="125" text-anchor="middle" font-weight="500">keccak256</text>
    <line x1="265" y1="135" x2="375" y2="135" class="inner-line"/>
    <text x="320" y="170" text-anchor="middle" class="subtext">32 bytes</text>

    <path d="M 390 165 L 422 165" class="line" marker-end="url(#arrow)"/>

    <rect x="430" y="100" width="180" height="130" class="box"/>
    <text x="520" y="125" text-anchor="middle" font-weight="500">on-chain tx</text>
    <line x1="445" y1="135" x2="595" y2="135" class="inner-line"/>
    <text x="520" y="170" text-anchor="middle" class="subtext">anchorAuditProof</text>
    <text x="520" y="190" text-anchor="middle" class="subtext">(bytes32, uint256)</text>

    <path d="M 610 165 L 642 165" class="line" marker-end="url(#arrow)"/>

    <rect x="650" y="100" width="130" height="130" class="box"/>
    <text x="715" y="125" text-anchor="middle" font-weight="500">txHash</text>
    <line x1="665" y1="135" x2="765" y2="135" class="inner-line"/>
    <text x="715" y="170" text-anchor="middle" class="subtext">→ audit</text>

    <line x1="50" y1="265" x2="780" y2="265" class="divider"/>

    <text x="50" y="300" class="title">verify</text>
    <rect x="50" y="310" width="730" height="100" class="box"/>

    <text x="167.5" y="345" text-anchor="middle" font-weight="500">rebuild payload from db</text>
    <line x1="70" y1="355" x2="265" y2="355" class="inner-line"/>
    <text x="167.5" y="380" text-anchor="middle" class="subtext">match stored hash ✓</text>

    <path d="M 280 355 L 322 355" class="line" marker-end="url(#arrow)"/>

    <text x="417.5" y="345" text-anchor="middle" font-weight="500">recompute hash</text>
    <line x1="340" y1="355" x2="495" y2="355" class="inner-line"/>
    <text x="417.5" y="380" text-anchor="middle" class="subtext">match contract state ✓</text>

    <path d="M 510 355 L 552 355" class="line" marker-end="url(#arrow)"/>

    <text x="665" y="345" text-anchor="middle" font-weight="500">isProofAnchored()</text>
    <line x1="570" y1="355" x2="760" y2="355" class="inner-line"/>
    <text x="665" y="380" text-anchor="middle" class="subtext">tamper-evident ✓</text>

    <text x="50" y="450" class="subtext">if any hash differs → trail was modified after anchoring</text>

</svg>
