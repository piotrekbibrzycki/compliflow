<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 360">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --fg2: #6b6b6b;
    --fg3: #999999;
    --line: #cccccc;
    --box-bg: #fafafa;
    --box-stroke: #d4d4d4;
  }

  text {
    font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
  }
</style>

<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="360" fill="var(--bg)"/>

<text x="40" y="32" font-size="8.8" fill="var(--fg3)" letter-spacing="0.5">audit proof · canonical payload, keccak256 hash, on-chain anchoring</text>
<line x1="40" y1="42" x2="640" y2="42" stroke="var(--line)" stroke-width="0.7"/>

<rect x="52" y="86" width="120" height="64" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="112" y="107" text-anchor="middle" dominant-baseline="central" font-size="9.8" fill="var(--fg)">canonical</text>
<text x="112" y="123" text-anchor="middle" dominant-baseline="central" font-size="8.2" fill="var(--fg3)">transfer + audit</text>
<text x="112" y="137" text-anchor="middle" dominant-baseline="central" font-size="8.2" fill="var(--fg3)">sorted JSON</text>

<line x1="172" y1="118" x2="218" y2="118" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="218" y="86" width="110" height="64" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="273" y="107" text-anchor="middle" dominant-baseline="central" font-size="9.8" fill="var(--fg)">keccak256</text>
<text x="273" y="126" text-anchor="middle" dominant-baseline="central" font-size="8.2" fill="var(--fg3)">32-byte hash</text>

<line x1="328" y1="118" x2="374" y2="118" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="374" y="86" width="130" height="64" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="439" y="107" text-anchor="middle" dominant-baseline="central" font-size="9.8" fill="var(--fg)">on-chain tx</text>
<text x="439" y="123" text-anchor="middle" dominant-baseline="central" font-size="8.2" fill="var(--fg3)">anchorAuditProof</text>
<text x="439" y="137" text-anchor="middle" dominant-baseline="central" font-size="8.2" fill="var(--fg3)">bytes32 proof</text>

<line x1="504" y1="118" x2="550" y2="118" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="550" y="86" width="88" height="64" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="594" y="107" text-anchor="middle" dominant-baseline="central" font-size="9.8" fill="var(--fg)">txHash</text>
<text x="594" y="126" text-anchor="middle" dominant-baseline="central" font-size="8.2" fill="var(--fg3)">stored</text>

<line x1="40" y1="192" x2="640" y2="192" stroke="var(--line)" stroke-width="0.7" stroke-dasharray="4 3"/>

<text x="40" y="224" font-size="8.8" fill="var(--fg3)" letter-spacing="0.5">verification</text>

<rect x="72" y="246" width="150" height="50" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="147" y="266" text-anchor="middle" dominant-baseline="central" font-size="9.2" fill="var(--fg)">rebuild payload</text>
<text x="147" y="282" text-anchor="middle" dominant-baseline="central" font-size="8.1" fill="var(--fg3)">from database</text>

<line x1="222" y1="271" x2="266" y2="271" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="266" y="246" width="150" height="50" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="341" y="266" text-anchor="middle" dominant-baseline="central" font-size="9.2" fill="var(--fg)">recompute hash</text>
<text x="341" y="282" text-anchor="middle" dominant-baseline="central" font-size="8.1" fill="var(--fg3)">same canonical rules</text>

<line x1="416" y1="271" x2="460" y2="271" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="460" y="246" width="150" height="50" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="535" y="266" text-anchor="middle" dominant-baseline="central" font-size="9.2" fill="var(--fg)">compare on-chain</text>
<text x="535" y="282" text-anchor="middle" dominant-baseline="central" font-size="8.1" fill="var(--fg3)">tamper-evident</text>

<text x="340" y="330" text-anchor="middle" font-size="8.8" fill="var(--fg3)">if the hash differs, the audit trail was modified after anchoring</text>

</svg>
