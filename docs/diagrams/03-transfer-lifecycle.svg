<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="100%" height="100%">
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 1 L 8 5 L 0 9 z" fill="#666"/>
        </marker>
    </defs>
    <style>
        text {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            fill: #333;
        }
        .header-title { font-size: 14px; fill: #888; }
        .header-line { stroke: #888; stroke-width: 1.5; }
        .box { fill: #fff; stroke: #666; stroke-width: 1.5; rx: 6; }
        .box-text-main { font-size: 14px; font-weight: 600; text-anchor: middle; }
        .box-text-sub { font-size: 12px; fill: #888; text-anchor: middle; }
        .line { stroke: #666; stroke-width: 1.5; fill: none; }
        .label { font-size: 12px; fill: #888; }
        .footer-box { fill: none; stroke: #888; stroke-width: 1.5; stroke-dasharray: 6 4; rx: 6; }
        .footer-text { font-size: 12px; fill: #888; text-anchor: middle; }
    </style>

    <text x="50" y="40" class="header-title">transfer lifecycle · six terminal and intermediate states</text>
    <line x1="50" y1="50" x2="850" y2="50" class="header-line"/>

    <rect x="370" y="80" width="160" height="50" class="box"/>
    <text x="450" y="110" class="box-text-main">request</text>

    <rect x="100" y="220" width="200" height="60" class="box"/>
    <text x="200" y="245" class="box-text-main">PENDING</text>
    <text x="200" y="265" class="box-text-sub">execute immediately</text>

    <rect x="350" y="220" width="200" height="60" class="box"/>
    <text x="450" y="245" class="box-text-main">PENDING_REVIEW</text>
    <text x="450" y="265" class="box-text-sub">awaiting reviewer</text>

    <rect x="600" y="220" width="200" height="60" class="box"/>
    <text x="700" y="245" class="box-text-main">BLOCKED</text>
    <text x="700" y="265" class="box-text-sub">terminal · no movement</text>

    <rect x="100" y="420" width="200" height="60" class="box"/>
    <text x="200" y="445" class="box-text-main">FAILED</text>
    <text x="200" y="465" class="box-text-sub">debit or credit failed</text>

    <rect x="350" y="420" width="200" height="60" class="box"/>
    <text x="450" y="445" class="box-text-main">COMPLETED</text>
    <text x="450" y="465" class="box-text-sub">funds moved</text>

    <rect x="600" y="420" width="200" height="60" class="box"/>
    <text x="700" y="445" class="box-text-main">REJECTED</text>
    <text x="700" y="465" class="box-text-sub">reviewer declined</text>

    <path d="M 390 130 L 250 215" class="line" marker-end="url(#arrow)"/>
    <text x="310" y="170" class="label">pass</text>

    <path d="M 450 130 L 450 215" class="line" marker-end="url(#arrow)"/>
    <text x="460" y="175" class="label">flag</text>

    <path d="M 510 130 L 650 215" class="line" marker-end="url(#arrow)"/>
    <text x="590" y="170" class="label">block</text>

    <path d="M 170 280 L 170 415" class="line" marker-end="url(#arrow)"/>
    <text x="160" y="355" class="label" text-anchor="end">execute failed</text>

    <path d="M 270 280 L 270 350 L 400 350 L 400 415" class="line" marker-end="url(#arrow)"/>
    <text x="335" y="340" class="label" text-anchor="middle">debit/credit ok</text>

    <path d="M 450 280 L 450 415" class="line" marker-end="url(#arrow)"/>
    <text x="460" y="360" class="label">approve</text>

    <path d="M 530 280 L 530 320 L 700 320 L 700 415" class="line" marker-end="url(#arrow)"/>
    <text x="615" y="310" class="label" text-anchor="middle">reject</text>

    <rect x="50" y="520" width="800" height="40" class="footer-box"/>
    <text x="450" y="545" class="footer-text">status is driven by compliance decision · reviewer action · execution outcome</text>
</svg>
