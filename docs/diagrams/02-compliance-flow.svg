<svg xmlns="http://www.w3.org/2000/svg" width="680" height="360" viewBox="0 0 680 360">
<style>
  text { font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace; }
  .fg { fill: #1a1a1a; }
  .fg2 { fill: #6b6b6b; }
  .fg3 { fill: #999999; }
  .box { fill: #fafafa; stroke: #000000; stroke-width: 0.8; }
  .line { stroke: #000000; stroke-width: 0.7; fill: none; }
  .dashed { stroke: #000000; stroke-width: 0.7; stroke-dasharray: 4 3; fill: none; }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="360" fill="#ffffff"/>

<rect x="240" y="24" width="200" height="40" rx="3" class="box"/>
<text x="340" y="44" text-anchor="middle" dominant-baseline="central" font-size="11" class="fg">transfer request</text>

<line x1="340" y1="64" x2="340" y2="94" class="line" marker-end="url(#a)"/>

<rect x="50" y="104" width="580" height="126" rx="4" class="dashed"/>
<text x="66" y="118" font-size="9" class="fg3" letter-spacing="0.5">compliance engine · decision table</text>

<rect x="85" y="132" width="100" height="40" rx="3" class="box"/>
<text x="135" y="152" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">threshold</text>

<rect x="195" y="132" width="100" height="40" rx="3" class="box"/>
<text x="245" y="152" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">watchlist</text>

<rect x="305" y="132" width="100" height="40" rx="3" class="box"/>
<text x="355" y="152" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">frequency</text>

<rect x="415" y="132" width="100" height="40" rx="3" class="box"/>
<text x="465" y="152" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">risk score</text>

<rect x="525" y="132" width="100" height="40" rx="3" class="box"/>
<text x="575" y="152" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">wallet screen</text>

<text x="340" y="202" text-anchor="middle" font-size="9" class="fg2">max severity wins · pass &lt; flag &lt; block</text>

<line x1="340" y1="230" x2="340" y2="260" class="line" marker-end="url(#a)"/>
<line x1="340" y1="260" x2="200" y2="260" class="line"/>
<line x1="340" y1="260" x2="510" y2="260" class="line"/>
<line x1="200" y1="260" x2="200" y2="270" class="line" marker-end="url(#a)"/>
<line x1="355" y1="260" x2="355" y2="270" class="line" marker-end="url(#a)"/>
<line x1="510" y1="260" x2="510" y2="270" class="line" marker-end="url(#a)"/>

<circle cx="130" cy="286" r="4" fill="#5a9d7a"/>
<rect x="145" y="270" width="110" height="32" rx="3" class="box"/>
<text x="200" y="286" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">pass → execute</text>

<circle cx="285" cy="286" r="4" fill="#c4a35a"/>
<rect x="300" y="270" width="110" height="32" rx="3" class="box"/>
<text x="355" y="286" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">flag → review</text>

<circle cx="440" cy="286" r="4" fill="#b0524a"/>
<rect x="455" y="270" width="110" height="32" rx="3" class="box"/>
<text x="510" y="286" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">block → stop</text>

<text x="340" y="336" text-anchor="middle" font-size="9" class="fg3">every rule evaluation is recorded as an audit event</text>
</svg>
