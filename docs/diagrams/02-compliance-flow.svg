<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 340">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --fg2: #6b6b6b;
    --fg3: #999999;
    --line: #cccccc;
    --box-bg: #fafafa;
    --box-stroke: #d4d4d4;
    --pass: #6f9f7c;
    --flag: #b59b61;
    --block: #b06a64;
  }

  text {
    font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
  }
</style>

<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="340" fill="var(--bg)"/>

<rect x="250" y="24" width="180" height="38" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="340" y="43" text-anchor="middle" dominant-baseline="central" font-size="10.5" fill="var(--fg)">transfer request</text>

<line x1="340" y1="62" x2="340" y2="92" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="50" y="102" width="580" height="118" rx="4" fill="none" stroke="var(--line)" stroke-width="0.7" stroke-dasharray="4 3"/>
<text x="66" y="118" font-size="9" fill="var(--fg3)" letter-spacing="0.5">compliance engine · decision table</text>

<rect x="78" y="138" width="104" height="36" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="130" y="157" text-anchor="middle" dominant-baseline="central" font-size="9.5" fill="var(--fg)">threshold</text>

<rect x="192" y="138" width="104" height="36" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="244" y="157" text-anchor="middle" dominant-baseline="central" font-size="9.5" fill="var(--fg)">watchlist</text>

<rect x="306" y="138" width="104" height="36" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="358" y="157" text-anchor="middle" dominant-baseline="central" font-size="9.5" fill="var(--fg)">frequency</text>

<rect x="420" y="138" width="104" height="36" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="472" y="157" text-anchor="middle" dominant-baseline="central" font-size="9.5" fill="var(--fg)">risk score</text>

<rect x="534" y="138" width="70" height="36" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="569" y="151" text-anchor="middle" dominant-baseline="central" font-size="8.6" fill="var(--fg)">wallet</text>
<text x="569" y="164" text-anchor="middle" dominant-baseline="central" font-size="8.6" fill="var(--fg)">screen</text>

<text x="340" y="202" text-anchor="middle" font-size="8.8" fill="var(--fg2)">max severity wins · pass &lt; flag &lt; block</text>

<line x1="340" y1="220" x2="340" y2="246" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="84" y="258" width="132" height="34" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<circle cx="104" cy="275" r="3.5" fill="var(--pass)"/>
<text x="150" y="276" text-anchor="middle" dominant-baseline="central" font-size="9.3" fill="var(--fg)">pass → execute</text>

<rect x="274" y="258" width="132" height="34" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<circle cx="294" cy="275" r="3.5" fill="var(--flag)"/>
<text x="340" y="276" text-anchor="middle" dominant-baseline="central" font-size="9.3" fill="var(--fg)">flag → review</text>

<rect x="464" y="258" width="132" height="34" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<circle cx="484" cy="275" r="3.5" fill="var(--block)"/>
<text x="530" y="276" text-anchor="middle" dominant-baseline="central" font-size="9.3" fill="var(--fg)">block → stop</text>

<path d="M340 246 H150 V258" fill="none" stroke="var(--line)" stroke-width="0.7" marker-end="url(#a)"/>
<path d="M340 246 V258" fill="none" stroke="var(--line)" stroke-width="0.7" marker-end="url(#a)"/>
<path d="M340 246 H530 V258" fill="none" stroke="var(--line)" stroke-width="0.7" marker-end="url(#a)"/>

<text x="340" y="320" text-anchor="middle" font-size="8.8" fill="var(--fg3)">every rule evaluation is recorded as an audit event</text>

</svg>
