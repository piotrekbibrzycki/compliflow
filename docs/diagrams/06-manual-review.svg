<svg xmlns="http://www.w3.org/2000/svg" width="680" height="340" viewBox="0 0 680 340">
<style>
  text { font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace; }
  .fg { fill: #1a1a1a; }
  .fg2 { fill: #6b6b6b; }
  .fg3 { fill: #999999; }
  .box { fill: #fafafa; stroke: #000000; stroke-width: 0.8; }
  .line { stroke: #000000; stroke-width: 0.7; fill: none; }
  .dashed { stroke: #000000; stroke-width: 0.7; stroke-dasharray: 4 3; fill: none; }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="340" fill="#ffffff"/>

<text x="40" y="32" font-size="9" class="fg3" letter-spacing="0.5">manual review · flagged transfers require a human decision</text>
<line x1="40" y1="40" x2="640" y2="40" class="line" stroke-width="0.4"/>

<circle cx="60" cy="82" r="4" fill="#c4a35a"/>
<rect x="75" y="66" width="170" height="32" rx="3" class="box"/>
<text x="160" y="82" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">PENDING_REVIEW</text>

<line x1="245" y1="82" x2="290" y2="82" class="line" marker-end="url(#a)"/>
<text x="267" y="76" text-anchor="middle" font-size="8" class="fg3">queue</text>

<rect x="290" y="60" width="180" height="120" rx="3" class="dashed"/>
<text x="306" y="78" font-size="9" class="fg3" letter-spacing="0.5">reviewer workbench</text>

<text x="306" y="100" font-size="9" class="fg2">transfer context</text>
<text x="306" y="116" font-size="9" class="fg2">rule evaluations</text>
<text x="306" y="132" font-size="9" class="fg2">legal + internal policy</text>
<text x="306" y="148" font-size="9" class="fg2">audit event history</text>
<text x="306" y="166" font-size="9" class="fg">→ decide approve / reject</text>

<line x1="380" y1="180" x2="380" y2="210" class="line"/>
<line x1="380" y1="210" x2="200" y2="210" class="line"/>
<line x1="380" y1="210" x2="560" y2="210" class="line"/>
<line x1="200" y1="210" x2="200" y2="240" class="line" marker-end="url(#a)"/>
<line x1="560" y1="210" x2="560" y2="240" class="line" marker-end="url(#a)"/>

<text x="280" y="206" text-anchor="middle" font-size="8" class="fg3">approve</text>
<text x="475" y="206" text-anchor="middle" font-size="8" class="fg3">reject</text>

<circle cx="130" cy="256" r="4" fill="#5a9d7a"/>
<rect x="145" y="240" width="140" height="32" rx="3" class="box"/>
<text x="215" y="256" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">COMPLETED</text>

<circle cx="490" cy="256" r="4" fill="#b0524a"/>
<rect x="505" y="240" width="140" height="32" rx="3" class="box"/>
<text x="575" y="256" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">REJECTED</text>

<text x="215" y="290" text-anchor="middle" font-size="9" class="fg3">debit/credit executed</text>
<text x="575" y="290" text-anchor="middle" font-size="9" class="fg3">no funds moved</text>

<rect x="40" y="304" width="600" height="24" rx="3" class="dashed"/>
<text x="340" y="320" text-anchor="middle" font-size="9" class="fg2">reviewer identity, timestamp, comment captured as an audit event</text>
</svg>
