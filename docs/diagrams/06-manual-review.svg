<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 260">
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --fg2: #6b6b6b;
    --fg3: #999999;
    --line: #cccccc;
    --box-bg: #fafafa;
    --box-stroke: #d4d4d4;
    --ok: #6f9f7c;
    --bad: #b06a64;
  }

  text {
    font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace;
  }
</style>

<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="260" fill="var(--bg)"/>

<text x="44" y="34" font-size="8.8" fill="var(--fg3)" letter-spacing="0.5">manual review · flagged transfers require a human decision</text>
<line x1="44" y1="44" x2="636" y2="44" stroke="var(--line)" stroke-width="0.7"/>

<rect x="70" y="112" width="150" height="42" rx="3" fill="var(--box-bg)" stroke="var(--box-stroke)" stroke-width="0.7"/>
<text x="145" y="130" text-anchor="middle" dominant-baseline="central" font-size="9.8" fill="var(--fg)">PENDING_REVIEW</text>
<text x="145" y="144" text-anchor="middle" dominant-baseline="central" font-size="8.2" fill="var(--fg3)">flagged transfer</text>

<line x1="220" y1="133" x2="280" y2="133" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>

<rect x="280" y="102" width="140" height="62" rx="3" fill="none" stroke="var(--line)" stroke-width="0.7" stroke-dasharray="4 3"/>
<text x="350" y="123" text-anchor="middle" dominant-baseline="central" font-size="9.5" fill="var(--fg)">reviewer</text>
<text x="350" y="139" text-anchor="middle" dominant-baseline="central" font-size="8.2" fill="var(--fg3)">checks rules</text>
<text x="350" y="153" text-anchor="middle" dominant-baseline="central" font-size="8.2" fill="var(--fg3)">and audit trail</text>

<path d="M 420 133 H 470 V 92 H 500" fill="none" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>
<text x="458" y="84" text-anchor="middle" font-size="8.2" fill="var(--fg3)">approve</text>

<path d="M 420 133 H 470 V 174 H 500" fill="none" stroke="var(--line)" stroke-width="0.8" marker-end="url(#a)"/>
<text x="458" y="183" text-anchor="middle" font-size="8.2" fill="var(--fg3)">reject</text>

<rect x="500" y="72" width="130" height="40" rx="3" fill="var(--box-bg)" stroke="var(--ok)" stroke-width="1.1"/>
<text x="565" y="94" text-anchor="middle" dominant-baseline="central" font-size="9.8" fill="var(--fg)">COMPLETED</text>

<rect x="500" y="154" width="130" height="40" rx="3" fill="var(--box-bg)" stroke="var(--bad)" stroke-width="1.1"/>
<text x="565" y="176" text-anchor="middle" dominant-baseline="central" font-size="9.8" fill="var(--fg)">REJECTED</text>

<text x="350" y="228" text-anchor="middle" font-size="8.8" fill="var(--fg3)">reviewer identity, decision time, and optional comment are stored as an audit event</text>

</svg>
