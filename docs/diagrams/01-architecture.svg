<svg xmlns="http://www.w3.org/2000/svg" width="680" height="480" viewBox="0 0 680 480">
<style>
  text { font-family: "SF Mono", "Cascadia Code", "Fira Code", Consolas, monospace; }
  .fg { fill: #1a1a1a; }
  .fg2 { fill: #6b6b6b; }
  .fg3 { fill: #999999; }
  .box { fill: #fafafa; stroke: #000000; stroke-width: 0.8; }
  .line { stroke: #000000; stroke-width: 0.7; fill: none; }
  .dashed { stroke: #000000; stroke-width: 0.7; stroke-dasharray: 4 3; fill: none; }
</style>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 2L8 5L2 8" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect width="680" height="480" fill="#ffffff"/>

<rect x="240" y="24" width="200" height="40" rx="3" class="box"/>
<text x="340" y="44" text-anchor="middle" dominant-baseline="central" font-size="11" class="fg">dashboard / client</text>

<line x1="340" y1="64" x2="340" y2="94" class="line" marker-end="url(#a)"/>

<rect x="40" y="104" width="600" height="180" rx="4" class="dashed"/>
<text x="56" y="120" font-size="9" class="fg3" letter-spacing="0.5">spring boot microservices</text>

<rect x="80" y="140" width="220" height="124" rx="3" class="box"/>
<text x="190" y="162" text-anchor="middle" font-size="11" class="fg" font-weight="500">account-service</text>
<text x="190" y="184" text-anchor="middle" font-size="9" class="fg2">:8081</text>
<line x1="105" y1="202" x2="275" y2="202" stroke="#000000" stroke-width="0.3"/>
<text x="100" y="220" font-size="9" class="fg2">auth (register, login, jwt)</text>
<text x="100" y="236" font-size="9" class="fg2">accounts (crud, balance)</text>

<rect x="380" y="140" width="220" height="124" rx="3" class="box"/>
<text x="490" y="162" text-anchor="middle" font-size="11" class="fg" font-weight="500">transfer-service</text>
<text x="490" y="184" text-anchor="middle" font-size="9" class="fg2">:8082</text>
<line x1="405" y1="202" x2="575" y2="202" stroke="#000000" stroke-width="0.3"/>
<text x="400" y="220" font-size="9" class="fg2">transfers, compliance engine</text>
<text x="400" y="236" font-size="9" class="fg2">audit, reviews, proofs</text>

<line x1="300" y1="202" x2="380" y2="202" class="line" marker-end="url(#a)"/>
<text x="340" y="197" text-anchor="middle" font-size="8" class="fg3">rest + jwt</text>

<line x1="190" y1="264" x2="190" y2="314" class="line" marker-end="url(#a)"/>
<rect x="80" y="324" width="220" height="40" rx="3" class="box"/>
<text x="190" y="344" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">postgres · accounts</text>

<line x1="490" y1="264" x2="490" y2="314" class="line" marker-end="url(#a)"/>
<rect x="380" y="324" width="220" height="40" rx="3" class="box"/>
<text x="490" y="344" text-anchor="middle" dominant-baseline="central" font-size="10" class="fg">postgres · transfers</text>

<line x1="490" y1="364" x2="490" y2="408" class="line" marker-end="url(#a)"/>
<text x="502" y="388" font-size="8" class="fg3">web3j</text>

<rect x="380" y="412" width="220" height="40" rx="3" class="box"/>
<text x="490" y="428" text-anchor="middle" font-size="10" class="fg">blockchain · evm</text>
<text x="490" y="442" text-anchor="middle" font-size="8" class="fg3">audit proof anchoring</text>

<text x="190" y="432" text-anchor="middle" font-size="9" class="fg3">database per service</text>
<text x="190" y="446" text-anchor="middle" font-size="9" class="fg3">rest for inter-service calls</text>
</svg>
